# config.yaml — GenAI-Based Real-Time Temporal Safety & Threat Engine for SDVs
# ══════════════════════════════════════════════════════════════════════════════

# ── LLM Configuration ─────────────────────────────────────────────────────────
llm:
  provider: "groq"
  model: "llama-3.3-70b-versatile"
  max_tokens: 1024
  temperature_default: 0.7
  temperature_precision: 0.1    # for parsing tasks
  temperature_creative: 0.95    # for scenario generation

# ── Agent Configuration ────────────────────────────────────────────────────────
agent:
  max_iterations: 3
  early_stop_threshold: 2       # minimum iterations before early stop allowed
  scenario_types:
    - normal
    - edge
    - stress

# ── Timing Thresholds (ISO 26262) ─────────────────────────────────────────────
timing:
  default_max_latency_ms: 100
  risk_levels:
    critical: 1.5               # actual > 150% of max
    high: 1.1                   # actual > 110%
    medium: 0.9                 # actual > 90%
    low: 0.7                    # actual < 70%

# ── RAG Configuration ──────────────────────────────────────────────────────────
rag:
  top_k: 3
  knowledge_base_path: "knowledge_base/"
  files:
    vss: "vss_signals.json"
    can: "can_messages.json"
    iso: "iso26262_rules.json"
    attacks: "attack_patterns.json"

# ── Dataset Paths ──────────────────────────────────────────────────────────────
datasets:
  timing_requirements: "datasets/requirements/timing_requirements.json"
  code_samples:
    python: "datasets/code_samples/brake_python.py"
    cpp:    "datasets/code_samples/brake_cpp.cpp"
    rust:   "datasets/code_samples/brake_rust.rs"
  runtime_traces:
    scenario_1: "datasets/runtime_traces/scenario_1_trace.json"
    scenario_2: "datasets/runtime_traces/scenario_2_trace.json"
    scenario_3: "datasets/runtime_traces/scenario_3_trace.json"

# ── Dashboard Configuration ────────────────────────────────────────────────────
dashboard:
  host: "localhost"
  port: 8501
  auto_refresh_seconds: 5
  output_dir: "outputs/"
  diagram_dir: "outputs/diagrams/"

# ── Output Configuration ───────────────────────────────────────────────────────
output:
  save_json: true
  save_diagrams: true
  output_dir: "outputs/"
  log_level: "INFO"